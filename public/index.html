<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dumb Stuff I Gotta Do Today</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>DUMB STUFF I GOTTA DO TODAY</h1>
      </header>
      <main id="app">
        <section class="tasks-card">
          <h2>My Stuff</h2>
          <div id="task-tabs" class="task-tabs"></div>
          <div class="task-input-row">
            <input type="text" id="task-input" placeholder="+ Add Stuff" />
            <button id="add-task-btn">+</button>
          </div>
          <ul id="task-list"></ul>
          <button id="reset-btn">Reset All Stuff</button>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
