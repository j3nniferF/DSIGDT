<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dumb Stuff I Gotta Do Today</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <!-- floating timer button -->
    <button id="timer-btn" class="timer-icon-btn" title="Open Timer">⏱️</button>

    <!-- timer panel -->
    <div id="timer-panel" class="timer-panel is-hidden">
      <h3>Focus Timer</h3>
      <div class="timer-display" id="timer-display">25:00</div>
      <div class="timer-controls">
        <input type="number" id="timer-minutes" value="25" min="1" max="90" />
        <span>min</span>
      </div>
      <div class="timer-buttons">
        <button id="timer-start">Start</button>
        <button id="timer-reset">Reset</button>
      </div>
    </div>
    <div class="container">
      <header>
        <h1>
          <span class="title-main">DUMB STUFF</span>
          <span class="title-sub">I GOTTA DO TODAY</span>
        </h1>
      </header>
      <main id="app">
        <section class="tasks-card">
          <h2>My Stuff</h2>
          <div id="task-tabs" class="task-tabs"></div>
          <div class="task-input-row">
            <input type="text" id="task-input" placeholder="+ Add Stuff" />
            <button id="add-task-btn">+</button>
          </div>
          <ul id="task-list"></ul>
          <button id="reset-btn">Reset All Stuff</button>
        </section>
        <section class="tasks-card">
          <h2>My Stats</h2>
          <p id="stats-summary" class="stats-summary">
            Add some stuff to get started!
          </p>
          <canvas id="stats-chart"></canvas>
        </section>
      </main>
      <footer>
        <p id="quote">Loading positive stuff...</p>
      </footer>
    </div>
    <!-- reminder popup -->
    <div id="reminder-popup" class="reminder-popup is-hidden">
      <p id="reminder-message">Unclench your jaw! 💜</p>
      <button id="reminder-dismiss">I did it!</button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
