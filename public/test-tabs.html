<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Style Test</title>
  <style>
    @font-face {
      font-family: "Popstar";
      src: url("assets/fonts/Popstar.woff2") format("woff2"),
           url("assets/fonts/Popstar.woff") format("woff");
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: url("assets/textures/pretty.png") center / cover fixed;
      font-family: "Helvetica Neue", sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-family: "Popstar", sans-serif;
      text-align: center;
      margin-bottom: 2rem;
      background: url("assets/textures/prettybg.png") center / cover;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: brightness(1) saturate(3) drop-shadow(2px 4px 8px purple);
      font-size: 2rem;
    }

    .demo-section {
      max-width: 500px;
      margin: 0 auto 3rem;
    }

    .demo-label {
      font-family: "Popstar", sans-serif;
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #ff3388, #dd44ff, #5599ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===================== */
    /* OPTION A: SEGMENTED   */
    /* ===================== */

    .seg-wrapper {
      position: relative;
      display: flex;
      background:
        linear-gradient(to top right, rgba(255,233,248,0.95), rgba(212,246,255,0.95), rgba(232,219,255,0.95)) padding-box,
        linear-gradient(to right, #ff3388, #dd44ff, #5599ff, #44ddaa, #ffdd44, #ff3388) border-box;
      border: 3px solid transparent;
      border-radius: 999px;
      padding: 5px;
      gap: 2px;
    }

    /* the sliding highlight pill */
    .seg-indicator {
      position: absolute;
      top: 5px;
      left: 5px;
      height: calc(100% - 10px);
      background:
        linear-gradient(to top right, rgba(255,233,248,0.97), rgba(212,246,255,0.97), rgba(232,219,255,0.97)) padding-box,
        linear-gradient(to right, #ff3388, #dd44ff, #5599ff, #44ddaa, #ffdd44, #ff3388) border-box;
      border: 2px solid transparent;
      border-radius: 999px;
      transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1), width 0.3s ease;
      pointer-events: none;
      filter: drop-shadow(1px 3px 6px rgba(193,77,204,0.5));
    }

    .seg-btn {
      flex: 1;
      border: none;
      background: transparent;
      border-radius: 999px;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-family: "Popstar", sans-serif;
      font-size: clamp(0.65rem, 2.5vw, 0.95rem);
      letter-spacing: 0.04em;
      white-space: nowrap;
      position: relative;
      z-index: 1;
      transition: filter 0.2s ease;
    }

    .seg-btn span {
      background: linear-gradient(to right, #ff3388, #dd44ff, #5599ff, #44ddaa, #ffdd44);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.6;
      transition: opacity 0.2s ease;
    }

    .seg-btn.active span {
      background: url("assets/textures/prettybg.png") center / cover;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: brightness(1) saturate(3) drop-shadow(1px 2px 4px purple);
      opacity: 1;
    }

    /* ===================== */
    /* OPTION C: FOLDER TABS */
    /* ===================== */

    .folder-area {
      display: flex;
      flex-direction: column;
    }

    .folder-tabs {
      display: flex;
      gap: 6px;
      padding: 0 12px;
      align-items: flex-end;
    }

    .folder-btn {
      border: none;
      background:
        rgba(255,255,255,0.25) padding-box;
      border: 2px solid rgba(26,26,46,0.2);
      border-bottom: none;
      border-radius: 14px 14px 0 0;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-family: "Popstar", sans-serif;
      font-size: clamp(0.65rem, 2.5vw, 0.9rem);
      letter-spacing: 0.04em;
      white-space: nowrap;
      backdrop-filter: blur(6px);
      opacity: 0.65;
      margin-bottom: -2px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .folder-btn span {
      background: linear-gradient(to right, #ff3388, #dd44ff, #5599ff, #44ddaa, #ffdd44);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .folder-btn.active {
      background:
        linear-gradient(to top right, rgba(255,233,248,0.97), rgba(212,246,255,0.97), rgba(232,219,255,0.97)) padding-box,
        linear-gradient(to right, #ff3388, #dd44ff, #5599ff, #44ddaa, #ffdd44) border-box;
      border: 2px solid transparent;
      border-bottom: 2px solid rgba(255,233,248,0.97);
      border-radius: 14px 14px 0 0;
      opacity: 1;
      filter: drop-shadow(1px -2px 6px rgba(193,77,204,0.3));
    }

    .folder-btn.active span {
      background: url("assets/textures/prettybg.png") center / cover;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: brightness(1) saturate(3) drop-shadow(1px 2px 4px purple);
    }

    .folder-card {
      background:
        url("assets/textures/prettybg.png") center / cover padding-box,
        linear-gradient(#1f1f1f, #1f1f1f) padding-box,
        linear-gradient(to top right, #ff3388, #dd44ff, #5599ff, #44ddaa, #ffdd44, #ff3388) border-box;
      background-blend-mode: screen, normal, normal;
      background-size: cover, 100% 100%, 300% 300%;
      border: 6px solid transparent;
      border-radius: 0 16px 16px 16px;
      padding: 1.25rem;
      min-height: 120px;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 0 2px #1a1a2e, 0 4px 20px rgba(193,77,204,0.3);
    }

    .folder-card p {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      text-align: center;
      padding-top: 1rem;
    }

    /* ===================== */
    /* OPTION A+C COMBO      */
    /* ===================== */

    .combo-area {
      display: flex;
      flex-direction: column;
    }

    .combo-tabs {
      display: flex;
      gap: 6px;
      padding: 0 12px;
      align-items: flex-end;
    }

    .combo-btn {
      border: 2px solid rgba(26,26,46,0.2);
      border-bottom: none;
      border-radius: 14px 14px 0 0;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(6px);
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-family: "Popstar", sans-serif;
      font-size: clamp(0.65rem, 2.5vw, 0.9rem);
      letter-spacing: 0.04em;
      white-space: nowrap;
      opacity: 0.65;
      margin-bottom: -2px;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .combo-btn span {
      background: linear-gradient(to right, #ff3388, #dd44ff, #5599ff, #44ddaa, #ffdd44);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .combo-btn.active {
      background:
        linear-gradient(to top right, rgba(255,233,248,0.97), rgba(212,246,255,0.97), rgba(232,219,255,0.97)) padding-box,
        linear-gradient(to right, #ff3388, #dd44ff, #5599ff, #44ddaa, #ffdd44) border-box;
      border: 2px solid transparent;
      border-bottom: 2px solid rgba(255,233,248,0.97);
      opacity: 1;
      transform: translateY(-3px);
      filter: drop-shadow(1px -3px 8px rgba(193,77,204,0.4));
    }

    .combo-btn.active span {
      background: url("assets/textures/prettybg.png") center / cover;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: brightness(1) saturate(3) drop-shadow(1px 2px 4px purple);
    }

    .combo-card {
      background:
        url("assets/textures/prettybg.png") center / cover padding-box,
        linear-gradient(#1f1f1f, #1f1f1f) padding-box,
        linear-gradient(to top right, #ff3388, #dd44ff, #5599ff, #44ddaa, #ffdd44, #ff3388) border-box;
      background-blend-mode: screen, normal, normal;
      background-size: cover, 100% 100%, 300% 300%;
      border: 6px solid transparent;
      border-radius: 0 16px 16px 16px;
      padding: 1.25rem;
      min-height: 120px;
      box-shadow: 0 0 0 2px #1a1a2e, 0 4px 20px rgba(193,77,204,0.3);
    }

    .combo-card p {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      text-align: center;
      padding-top: 1rem;
    }
  </style>
</head>
<body>

  <h1>Tab Style Test</h1>

  <!-- OPTION A: SEGMENTED CONTROL -->
  <div class="demo-section">
    <p class="demo-label">Option A — Segmented Control</p>
    <div class="seg-wrapper" id="seg-wrapper">
      <div class="seg-indicator" id="seg-indicator"></div>
      <button class="seg-btn active" onclick="selectSeg(this)"><span>dumb stuff</span></button>
      <button class="seg-btn" onclick="selectSeg(this)"><span>gotta do today</span></button>
      <button class="seg-btn" onclick="selectSeg(this)"><span>other stuff</span></button>
      <button class="seg-btn" onclick="selectSeg(this)"><span>all stuff</span></button>
    </div>
  </div>

  <!-- OPTION C: FOLDER TABS -->
  <div class="demo-section">
    <p class="demo-label">Option C — Folder Tabs</p>
    <div class="folder-area">
      <div class="folder-tabs">
        <button class="folder-btn active" onclick="selectFolder(this)"><span>dumb stuff</span></button>
        <button class="folder-btn" onclick="selectFolder(this)"><span>gotta do today</span></button>
        <button class="folder-btn" onclick="selectFolder(this)"><span>other stuff</span></button>
        <button class="folder-btn" onclick="selectFolder(this)"><span>all stuff</span></button>
      </div>
      <div class="folder-card">
        <p>Your stuff goes here!</p>
      </div>
    </div>
  </div>

  <!-- OPTION A+C COMBO -->
  <div class="demo-section">
    <p class="demo-label">Option A+C — Folder Tabs with Lift</p>
    <div class="combo-area">
      <div class="combo-tabs">
        <button class="combo-btn active" onclick="selectCombo(this)"><span>dumb stuff</span></button>
        <button class="combo-btn" onclick="selectCombo(this)"><span>gotta do today</span></button>
        <button class="combo-btn" onclick="selectCombo(this)"><span>other stuff</span></button>
        <button class="combo-btn" onclick="selectCombo(this)"><span>all stuff</span></button>
      </div>
      <div class="combo-card">
        <p>Your stuff goes here!</p>
      </div>
    </div>
  </div>

  <script>
    // OPTION A: sliding indicator
    function selectSeg(btn) {
      const wrapper = document.getElementById("seg-wrapper");
      wrapper.querySelectorAll(".seg-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      moveIndicator();
    }

    function moveIndicator() {
      const wrapper = document.getElementById("seg-wrapper");
      const indicator = document.getElementById("seg-indicator");
      const active = wrapper.querySelector(".seg-btn.active");
      if (!active) return;
      indicator.style.width = active.offsetWidth + "px";
      indicator.style.transform = `translateX(${active.offsetLeft - 5}px)`;
    }

    // OPTION C: folder tabs
    function selectFolder(btn) {
      btn.closest(".folder-tabs").querySelectorAll(".folder-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    // OPTION A+C COMBO
    function selectCombo(btn) {
      btn.closest(".combo-tabs").querySelectorAll(".combo-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    // init the sliding indicator position on load
    window.addEventListener("load", moveIndicator);
    window.addEventListener("resize", moveIndicator);
  </script>

</body>
</html>
